version: '3.8'

services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "sqlite:///./salary.db"
    volumes:
      - ./salary.db:/app/salary.db
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  # Optional: For PostgreSQL instead of SQLite
